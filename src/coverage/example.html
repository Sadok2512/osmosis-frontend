<!--
  example.html — minimal Leaflet demo of the refactored site-footprint
  Visual Coverage module. Open via a static server pointed at this folder
  (Leaflet refuses file:// imports for ES modules).

  The demo generates ~80 sites with 1-3 sectors each (not 600 random
  cells) so the rendered map visually matches what production data
  produces: isolated coloured "daisy" footprints with empty space
  between distant sites.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Visual Coverage · Site-footprint example</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="./coverage-panel.css" />
<style>
  html, body { margin:0; height:100%; background:#0b1014; color:#e6edf3;
               font-family: system-ui, sans-serif; }
  .layout { display:grid; grid-template-columns: 320px 1fr; height:100vh; }
  .sidebar { background:#10171d; border-right:1px solid #1c262f; padding:18px; overflow-y:auto; }
  #map { height:100%; background:#0e1419; }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <h1 style="font-size:14px;letter-spacing:.06em;margin-bottom:18px;">
      RAN OPS · visual coverage demo
    </h1>
    <div id="cov-panel-mount"></div>
  </aside>
  <main><div id="map"></div></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initVisualCoverage } from './coverage-layer.js';

  // 1. Map
  const map = L.map('map').setView([43.40, 5.45], 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    { subdomains:'abcd', attribution:'© OSM © CARTO' }).addTo(map);

  // 2. Generate ~80 sites, each with 1-3 sectors. We scatter sites in
  //    clumps so the demo shows BOTH cases the module is designed for:
  //    isolated round footprints and footprints clipped by close neighbours.
  function generateDemoCells(nSites = 80) {
    const cells = [];
    const kpis = ['green','green','green','green','orange','red'];
    const clusters = [
      { lat: 43.55, lon: 5.30, spread: 0.04 },  // dense urban cluster
      { lat: 43.30, lon: 5.50, spread: 0.05 },  // dense urban cluster
      { lat: 43.42, lon: 5.20, spread: 0.18 },  // sparse rural belt
    ];
    for (let s = 0; s < nSites; s++) {
      const cluster = clusters[s % clusters.length];
      const lat = cluster.lat + (Math.random() - 0.5) * cluster.spread * 2;
      const lon = cluster.lon + (Math.random() - 0.5) * cluster.spread * 2;
      const nSectors = 1 + Math.floor(Math.random() * 3); // 1-3 sectors
      const siteId   = `SITE${String(s + 1).padStart(4, '0')}`;
      const siteName = `Site-${s + 1}`;
      // Spread sectors evenly around the compass, jittered for realism.
      const az0 = Math.random() * 360;
      const step = 360 / Math.max(nSectors, 1);
      const siteKpi = kpis[Math.floor(Math.random() * kpis.length)];
      for (let k = 0; k < nSectors; k++) {
        cells.push({
          id: `${siteId}_C${k + 1}`,
          siteId, siteName,
          lat, lon,
          azimuth: (az0 + k * step) % 360,
          beamwidth: 65,
          maxRadius: 1500,
          tech: Math.random() < 0.4 ? '5G' : '4G',
          band: 'n78 3500',
          // Cell-level KPI follows the site bucket so the worst-case
          // colouring is meaningful.
          kpi: siteKpi,
          rsrp: -(80 + Math.random() * 30).toFixed(1),
        });
      }
    }
    return cells;
  }

  const cells = generateDemoCells();

  // 3. Initialise the module
  const coverage = initVisualCoverage({
    map,
    cells,
    panelMount: document.getElementById('cov-panel-mount'),
    defaultEnabled: false,   // off by default — operator toggles on
    maxRadiusMeters: 1500,
  });

  // 4. Optional events
  coverage.on('ready', (info) => {
    console.log('[demo] coverage ready:', info);
  });
</script>
</body>
</html>
