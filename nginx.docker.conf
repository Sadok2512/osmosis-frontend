# Nginx config for the dockerized frontend.
# Mirrors qoebit-frontend/server/spa-proxy.js targets so SPA + API
# routes resolve identically whether you run preview node or this image.
#
# Backend hosts come from env vars at container start (envsubst-style)
# so the same image runs mono-VM (parser=localhost) and split (parser=vm-compute).

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — all unknown routes serve index.html (React Router takes over).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── API proxies ─────────────────────────────────────────────────
  location /api/v1/ {
    proxy_pass http://${PARSER_HOST:-osmosis-parser}:${PARSER_PORT:-8000};
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_read_timeout 300s;
  }

  location /admin/api/ {
    proxy_pass http://${PARSER_HOST:-osmosis-parser}:${PARSER_PORT:-8000};
    proxy_set_header Host $host;
  }

  location /kpi-api/ {
    proxy_pass http://${KPI_HOST:-kpi-engine}:${KPI_PORT:-8001}/;
    proxy_set_header Host $host;
  }

  location /agent-api/ {
    proxy_pass http://${PARSER_HOST:-osmosis-parser}:${PARSER_PORT:-8000}/api/v1/agent/;
    proxy_set_header Host $host;
    proxy_buffering off;          # SSE
    proxy_read_timeout 600s;
  }

  location /ml-api/ {
    proxy_pass http://${ML_HOST:-ml-engine}:${ML_PORT:-11002}/api/v1/ml/;
    proxy_set_header Host $host;
  }

  location /agentic-api/ {
    proxy_pass http://${AGENTIC_HOST:-agentic-engine}:${AGENTIC_PORT:-11003}/;
    proxy_set_header Host $host;
  }

  # Long-cache hashed assets, no-cache for index.html so versions update fast.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html { add_header Cache-Control "no-store"; }
}
