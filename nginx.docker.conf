# Nginx config — variables are substituted at container start by envsubst
# (see Dockerfile CMD). Defaults assume network_mode: host so all backends
# are at 127.0.0.1.

server {
  listen ${NGINX_PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/v1/ {
    proxy_pass http://${PARSER_HOST}:${PARSER_PORT};
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_read_timeout 300s;
  }

  location /admin/api/ {
    proxy_pass http://${PARSER_HOST}:${PARSER_PORT};
    proxy_set_header Host $host;
  }

  location /kpi-api/ {
    proxy_pass http://${KPI_HOST}:${KPI_PORT}/;
    proxy_set_header Host $host;
  }

  location /agent-api/ {
    proxy_pass http://${PARSER_HOST}:${PARSER_PORT}/api/v1/agent/;
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_read_timeout 600s;
  }

  location /ml-api/ {
    proxy_pass http://${ML_HOST}:${ML_PORT}/api/v1/ml/;
    proxy_set_header Host $host;
  }

  # agentic-engine — RCA / Recommendation / Assess / Execute / Outcome.
  # Bare-metal :11003 today; could be containerised later.
  location /agentic-api/ {
    proxy_pass http://${AGENTIC_HOST}:${AGENTIC_PORT}/api/v1/agentic/;
    proxy_set_header Host $host;
    proxy_read_timeout 300s;
  }

  location ~* \.(?:js|css|woff2?|svg|png|jpg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html { add_header Cache-Control "no-store"; }
}
